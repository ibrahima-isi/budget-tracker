[phases.setup]
nixPkgs = [
    "php83",
    "php83Packages.composer",
    "php83Extensions.pdo",
    "php83Extensions.pdo_pgsql",
    "php83Extensions.mbstring",
    "php83Extensions.xml",
    "php83Extensions.curl",
    "php83Extensions.zip",
    "php83Extensions.gd",
    "php83Extensions.fileinfo",
    "nodejs_20",
    "nodePackages.npm"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader --ignore-platform-reqs",
    "npm ci"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs storage/app/private && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php -S 0.0.0.0:$PORT -t public"
