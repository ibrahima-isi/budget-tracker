[build]
builder = "RAILPACK"
buildCommand = "composer install --no-dev --optimize-autoloader --no-scripts --no-interaction && npm install --omit=dev && npm run build"

[deploy]
startCommand = "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache storage/logs storage/app/private && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache && php -S 0.0.0.0:$PORT -t public"
healthcheckPath = "/"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
